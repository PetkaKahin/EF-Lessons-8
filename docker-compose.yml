name: ef_lessons_8

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: "${APP_BUILD_TARGET:-dev}"
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    image: ef_lessons_8_app:${APP_BUILD_TARGET:-dev}
    container_name: ef_lessons_8_app
    working_dir: /var/www/html
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/sbin/php-fpm -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel

  nginx:
    image: nginx:stable-alpine
    container_name: ef_lessons_8_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - app_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel

  db:
    image: postgres:17-alpine
    container_name: ef_lessons_8_db
    environment:
      POSTGRES_DB: "${DB_DATABASE:-laravel}"
      POSTGRES_USER: "${DB_USERNAME:-laravel}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
    ports:
      - "${DB_PORT_FORWARD:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - laravel

  redis:
    image: redis:7-alpine
    container_name: ef_lessons_8_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT_FORWARD:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - laravel

volumes:
  app_storage:
  db_data:
  redis_data:

networks:
  laravel:
    driver: bridge
